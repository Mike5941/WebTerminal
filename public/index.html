<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <title>WebTerminal</title>
  <link rel="icon" type="image/png" href="/icon.png" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
  <link rel="stylesheet" href="/styles.css" />
</head>

<body>
  <div id="app">
    <div id="sessionBar" aria-label="Terminal sessions">
      <div id="sessionTabs" role="tablist" aria-label="Terminal sessions"></div>
      <button id="addSession" type="button" title="새 터미널 세션" aria-label="새 터미널 세션">+</button>
      <button id="broadcastToggle" type="button" aria-pressed="false" title="터미널 동시 입력" aria-label="터미널 동시 입력">⇉</button>
    </div>
    <div id="terminalHost"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
  <script type="module" src="/js/app.js"></script>
</body>

</html>
