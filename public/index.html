<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>WebTerminal</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
<style>
  :root {
    color-scheme: dark;
    --bg: #1e1d1b;
    --tab-bg: #242424;
    --tab-active: #303030;
    --tab-border: #3b3b3b;
    --text: #f4f4f4;
    --muted: #a8a8a8;
  }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    height: 100%;
    font-family: "SF Mono", "SFMono-Regular", ui-monospace, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
  }

  body {
    overflow: hidden;
  }

  #app {
    display: grid;
    grid-template-rows: 36px minmax(0, 1fr);
    height: 100vh;
    background: var(--bg);
  }

  #sessionBar {
    display: flex;
    align-items: center;
    gap: 4px;
    min-width: 0;
    padding: 4px 8px;
    background: var(--tab-bg);
    border-bottom: 1px solid var(--tab-border);
    box-sizing: border-box;
  }

  #sessionTabs {
    display: flex;
    align-items: center;
    gap: 4px;
    min-width: 0;
    overflow-x: auto;
    scrollbar-width: none;
  }

  #sessionTabs::-webkit-scrollbar {
    display: none;
  }

  .session-tab {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    height: 28px;
    min-width: 92px;
    max-width: 180px;
    padding: 0 8px;
    color: var(--muted);
    background: transparent;
    border: 1px solid transparent;
    border-radius: 6px;
    font: inherit;
    font-size: 12px;
    cursor: pointer;
  }

  .session-tab.active {
    color: var(--text);
    background: var(--tab-active);
    border-color: var(--tab-border);
  }

  .session-tab-label {
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .session-tab-rename {
    width: 100%;
    min-width: 0;
    color: var(--text);
    background: transparent;
    border: none;
    outline: none;
    font: inherit;
    font-size: 12px;
  }

  .session-close,
  #addSession {
    display: inline-grid;
    place-items: center;
    width: 20px;
    height: 20px;
    padding: 0;
    color: var(--muted);
    background: transparent;
    border: 0;
    border-radius: 4px;
    font: inherit;
    line-height: 1;
    cursor: pointer;
  }

  .session-close:hover,
  #addSession:hover {
    color: var(--text);
    background: #3a3a3a;
  }

  #terminalHost {
    position: relative;
    min-height: 0;
  }

  .terminal-session {
    position: absolute;
    inset: 0;
    padding: 24px 16px 48px;
    box-sizing: border-box;
    visibility: hidden;
  }

  .terminal-session.active {
    visibility: visible;
  }

  .terminal-session.suppress-selection .xterm-selection {
    display: none !important;
  }

  .terminal-session .xterm {
    height: 100%;
  }

  .scrollbar-hit-area {
    position: absolute;
    top: 16px;
    right: 16px;
    bottom: 16px;
    width: 18px;
    cursor: default;
    z-index: 5;
  }

  .copy-toast {
    position: fixed;
    transform: translate(-50%, -130%);
    background: var(--tab-active);
    color: var(--text);
    border: 1px solid var(--tab-border);
    border-radius: 6px;
    padding: 4px 8px;
    font-size: 12px;
    pointer-events: none;
    z-index: 1000;
    animation: copy-toast-fade 0.9s ease forwards;
  }

  @keyframes copy-toast-fade {
    0% { opacity: 0; transform: translate(-50%, -120%); }
    15% { opacity: 1; transform: translate(-50%, -130%); }
    80% { opacity: 1; }
    100% { opacity: 0; transform: translate(-50%, -150%); }
  }

  .xterm .xterm-rows .xterm-cursor {
    background: transparent !important;
    border: 0 !important;
    box-shadow: inset 2px 0 0 #d97757 !important;
  }

  .xterm .xterm-rows .xterm-cursor-outline {
    outline: none !important;
  }
</style>
</head>
<body>
<div id="app">
  <div id="sessionBar" aria-label="Terminal sessions">
    <div id="sessionTabs" role="tablist" aria-label="Terminal sessions"></div>
    <button id="addSession" type="button" title="새 터미널 세션" aria-label="새 터미널 세션">+</button>
  </div>
  <div id="terminalHost"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
<script>
  const terminalOptions = {
    cursorBlink: true,
    cursorStyle: 'bar',
    cursorWidth: 2,
    fontFamily: '"SF Mono", "SFMono-Regular", ui-monospace, Menlo, Monaco, Consolas, "Liberation Mono", monospace',
    fontSize: 14,
    fontWeight: 500,
    theme: {
      // "Claude Dark" — hues sampled from the editor screenshot, mapped onto the
      // ANSI palette so ls/prompt/etc. pick them up (terminals can't syntax-highlight).
      background: '#1e1d1b',
      foreground: '#e6e1d8',
      cursor: '#d97757',
      cursorAccent: '#1e1d1b',
      selectionBackground: '#3f3a34',
      black: '#1e1d1b',
      red: '#cc7c5e',
      green: '#8aa872',
      yellow: '#d3a55f',
      blue: '#6b9bc3',
      magenta: '#b08cc4',
      cyan: '#6bb0aa',
      white: '#d4cfc6',
      brightBlack: '#5c574f',
      brightRed: '#e08a68',
      brightGreen: '#9cba84',
      brightYellow: '#e0b574',
      brightBlue: '#7fabd4',
      brightMagenta: '#c29fd4',
      brightCyan: '#7fc0ba',
      brightWhite: '#f0ebe2',
    },
  };

  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  const terminalHost = document.getElementById('terminalHost');
  const sessionTabs = document.getElementById('sessionTabs');
  const addSessionButton = document.getElementById('addSession');
  const sessions = [];
  let activeSessionId = null;
  let nextSessionId = 1;
  let renamingSessionId = null;

  function sendInput(session, data) {
    if (session.ws.readyState === WebSocket.OPEN) {
      session.ws.send(JSON.stringify({ type: 'input', data }));
      return;
    }
    session.pendingMessages.push({ type: 'input', data });
  }

  function resizeSession(session) {
    if (!session.container.classList.contains('active')) return;
    session.fitAddon.fit();
    const message = { type: 'resize', cols: session.term.cols, rows: session.term.rows };
    if (session.ws.readyState === WebSocket.OPEN) {
      session.ws.send(JSON.stringify(message));
      return;
    }
    session.pendingMessages.push(message);
  }

  function flushPendingMessages(session) {
    while (session.pendingMessages.length > 0 && session.ws.readyState === WebSocket.OPEN) {
      session.ws.send(JSON.stringify(session.pendingMessages.shift()));
    }
  }

  function readSelectionPosition(session) {
    const { term } = session;
    if (!term.hasSelection() || typeof term.getSelectionPosition !== 'function') return null;
    const position = term.getSelectionPosition();
    if (!position) return null;

    // getSelectionPosition() returns absolute buffer rows, but every caller
    // here (cursorY-based row checks, viewport pixel math) works in
    // viewport-relative rows. Convert once so callers stay consistent.
    const viewportY = term.buffer.active.viewportY;
    return {
      startColumn: position.startColumn ?? position.start?.x,
      startRow: (position.startRow ?? position.start?.y) - viewportY,
      endColumn: position.endColumn ?? position.end?.x,
      endRow: (position.endRow ?? position.end?.y) - viewportY,
    };
  }

  function deleteSelectedInput(session) {
    const { term } = session;
    const selection = readSelectionPosition(session);
    if (!selection) return false;

    const { startColumn, startRow, endColumn, endRow } = selection;
    if ([startColumn, startRow, endColumn, endRow].some((value) => typeof value !== 'number')) return false;
    if (startRow !== endRow || startRow !== term.buffer.active.cursorY) return false;

    const selectedLength = endColumn - startColumn;
    if (selectedLength <= 0) return false;

    const cursorColumn = term.buffer.active.cursorX;
    const moveToSelectionEnd = endColumn - cursorColumn;
    const moveSeq = moveToSelectionEnd > 0
      ? '\x1b[C'.repeat(moveToSelectionEnd)
      : '\x1b[D'.repeat(Math.abs(moveToSelectionEnd));

    term.clearSelection();
    sendInput(session, `${moveSeq}${'\x7f'.repeat(selectedLength)}`);
    return true;
  }

  function getTerminalGeometry(session) {
    const screenEl = session.term.element.querySelector('.xterm-screen');
    const cursorEl = session.term.element.querySelector('.xterm-cursor');
    if (!screenEl || !cursorEl) return null;

    const screenRect = screenEl.getBoundingClientRect();
    const cursorRect = cursorEl.getBoundingClientRect();
    const cellWidth = cursorRect.width || screenRect.width / session.term.cols;
    const cellHeight = cursorRect.height || screenRect.height / session.term.rows;

    return { screenRect, cursorRect, cellWidth, cellHeight };
  }

  function showCopyToast(point) {
    const toast = document.createElement('div');
    toast.className = 'copy-toast';
    toast.textContent = '출력 복사됨';
    toast.style.left = `${point.x}px`;
    toast.style.top = `${point.y}px`;
    document.body.append(toast);
    setTimeout(() => toast.remove(), 900);
  }

  // Heuristic block-copy: relies on the powerlevel10k box prompt markers
  // (╭─ ... / ╰─❯ ...) to find where the clicked command's output starts and
  // ends. Breaks if the prompt theme/style changes.
  function findCommandOutputRange(session, absRow) {
    const buf = session.term.buffer.active;
    const lineText = (i) => buf.getLine(i)?.translateToString(true).trimStart() ?? null;

    let promptRow = -1;
    for (let i = absRow; i >= 0; i -= 1) {
      const text = lineText(i);
      if (text !== null && text.startsWith('╰─❯')) {
        promptRow = i;
        break;
      }
    }
    if (promptRow === -1) return null;

    let endRow = buf.length - 1;
    for (let i = promptRow + 1; i < buf.length; i += 1) {
      const text = lineText(i);
      if (text !== null && text.startsWith('╭─')) {
        endRow = i - 1;
        break;
      }
    }

    const startRow = promptRow + 1;
    while (endRow >= startRow && (lineText(endRow) ?? '') === '') endRow -= 1;
    if (endRow < startRow) return null;

    return { startRow, endRow };
  }

  async function copyCommandOutputAt(session, point) {
    const geometry = getTerminalGeometry(session);
    if (!geometry) return false;

    const { screenRect, cellHeight } = geometry;
    const clickRow = Math.floor((point.y - screenRect.top) / cellHeight);
    const buf = session.term.buffer.active;
    const range = findCommandOutputRange(session, buf.baseY + clickRow);
    if (!range) return false;

    const text = [];
    for (let i = range.startRow; i <= range.endRow; i += 1) {
      text.push(buf.getLine(i)?.translateToString(true) ?? '');
    }
    await navigator.clipboard.writeText(text.join('\n'));
    showCopyToast(point);
    return true;
  }

  function moveCursorToPointer(session, point) {
    const geometry = getTerminalGeometry(session);
    if (!geometry) return false;

    const { screenRect, cursorRect, cellWidth, cellHeight } = geometry;
    const clickRow = Math.floor((point.x - screenRect.left) / cellWidth);
    const clickLine = Math.floor((point.y - screenRect.top) / cellHeight);
    const cursorCol = Math.max(0, Math.min(session.term.cols - 1, Math.round((cursorRect.left - screenRect.left) / cellWidth)));
    const cursorLine = Math.floor((cursorRect.top - screenRect.top) / cellHeight);

    if (clickLine !== cursorLine) return false;

    const clickCol = Math.max(0, Math.min(session.term.cols - 1, clickRow));
    const delta = clickCol - cursorCol;
    if (delta === 0) return true;

    const seq = delta > 0 ? '\x1b[C' : '\x1b[D';
    sendInput(session, seq.repeat(Math.abs(delta)));
    return true;
  }

  function clearClickSelection(session) {
    session.term.clearSelection();
  }

  function suppressSelection(session) {
    session.container.classList.add('suppress-selection');
  }

  function unsuppressSelection(session) {
    session.container.classList.remove('suppress-selection');
  }

  function syncScrollThumbDrag(session, pointerY) {
    const viewport = session.term.element.querySelector('.xterm-viewport');
    if (!viewport || viewport.scrollHeight <= viewport.clientHeight) return;

    const rect = viewport.getBoundingClientRect();
    const ratio = Math.max(0, Math.min(1, (pointerY - rect.top) / rect.height));
    viewport.scrollTop = ratio * (viewport.scrollHeight - viewport.clientHeight);
  }

  function attachScrollbarHitArea(session) {
    const hitArea = document.createElement('div');
    hitArea.className = 'scrollbar-hit-area';
    hitArea.setAttribute('aria-hidden', 'true');
    session.container.append(hitArea);

    hitArea.addEventListener('pointerdown', (event) => {
      event.preventDefault();
      event.stopPropagation();
      session.isDraggingScrollbar = true;
      hitArea.setPointerCapture(event.pointerId);
      syncScrollThumbDrag(session, event.clientY);
      clearClickSelection(session);
    });

    hitArea.addEventListener('pointermove', (event) => {
      if (!session.isDraggingScrollbar) return;
      event.preventDefault();
      event.stopPropagation();
      syncScrollThumbDrag(session, event.clientY);
      clearClickSelection(session);
    });

    hitArea.addEventListener('pointerup', (event) => {
      if (!session.isDraggingScrollbar) return;
      event.preventDefault();
      event.stopPropagation();
      session.isDraggingScrollbar = false;
      hitArea.releasePointerCapture(event.pointerId);
      clearClickSelection(session);
    });
  }

  function attachTerminalBehavior(session) {
    const { term } = session;

    term.onData((data) => {
      sendInput(session, data);
    });

    term.attachCustomKeyEventHandler((e) => {
      if (e.type !== 'keydown') return true;

      if (e.metaKey && e.key.toLowerCase() === 'a') {
        e.preventDefault();
        term.selectAll();
        return false;
      }

      if (e.metaKey && e.key.toLowerCase() === 'c' && term.hasSelection()) {
        // Selecting into the empty area below short output makes xterm append a
        // blank line per empty row. Strip trailing blank lines before copying.
        const text = term.getSelection().replace(/\s+$/, '');
        if (text) {
          e.preventDefault();
          navigator.clipboard.writeText(text);
          return false;
        }
      }

      if ((e.key === 'Backspace' || e.key === 'Delete') && deleteSelectedInput(session)) {
        e.preventDefault();
        return false;
      }

      if (!e.metaKey) return true;
      if (e.key === 'ArrowLeft') {
        e.preventDefault();
        sendInput(session, '\x01');
        return false;
      }
      if (e.key === 'ArrowRight') {
        e.preventDefault();
        sendInput(session, '\x05');
        return false;
      }
      if (e.key === 'Backspace') {
        e.preventDefault();
        sendInput(session, '\x15');
        return false;
      }
      if (e.key.toLowerCase() === 'z') {
        e.preventDefault();
        sendInput(session, '\x1f');
        return false;
      }
      return true;
    });

    term.element.addEventListener('pointerdown', (e) => {
      if (e.button !== 0) return;

      // PointerEvent.detail is always 0 (click-count only exists on the
      // legacy click/dblclick MouseEvents), so track double/triple-click
      // ourselves via timing, the same way browsers do internally.
      const now = performance.now();
      session.pointerClickCount = now - session.lastPointerDownAt < 400 ? session.pointerClickCount + 1 : 1;
      session.lastPointerDownAt = now;

      if (session.pointerClickCount > 1) {
        unsuppressSelection(session);
      } else {
        suppressSelection(session);
      }
      session.pointerDownPos = { x: e.clientX, y: e.clientY };
    });

    term.element.addEventListener('pointermove', (e) => {
      const downPos = session.pointerDownPos;
      if (!downPos) return;

      const geometry = getTerminalGeometry(session);
      if (!geometry) return;

      if (Math.hypot(e.clientX - downPos.x, e.clientY - downPos.y) > geometry.cellWidth) {
        unsuppressSelection(session);
      }
    });

    term.element.addEventListener('pointerup', (e) => {
      const downPos = session.pointerDownPos;
      session.pointerDownPos = null;
      if (!downPos) return;
      if (session.pointerClickCount > 1) {
        unsuppressSelection(session);
        return;
      }

      const geometry = getTerminalGeometry(session);
      if (!geometry) return;

      if (Math.hypot(e.clientX - downPos.x, e.clientY - downPos.y) > geometry.cellWidth) return;
      e.preventDefault();
      e.stopPropagation();
      clearClickSelection(session);

      moveCursorToPointer(session, downPos);
      clearClickSelection(session);
      setTimeout(() => unsuppressSelection(session), 90);
    });

    term.element.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      copyCommandOutputAt(session, { x: e.clientX, y: e.clientY });
    });
  }

  function startRenameSession(id) {
    renamingSessionId = id;
    renderTabs();
  }

  function commitRename(session, value) {
    const trimmed = value.trim();
    if (trimmed) session.title = trimmed;
    renamingSessionId = null;
    renderTabs();
  }

  function renderTabs() {
    sessionTabs.replaceChildren();
    for (const session of sessions) {
      const tab = document.createElement('div');
      tab.tabIndex = 0;
      tab.className = `session-tab${session.id === activeSessionId ? ' active' : ''}`;
      tab.setAttribute('role', 'tab');
      tab.setAttribute('aria-selected', String(session.id === activeSessionId));
      tab.title = session.title;
      tab.addEventListener('click', () => activateSession(session.id));
      tab.addEventListener('contextmenu', (event) => {
        event.preventDefault();
        startRenameSession(session.id);
      });

      if (session.id === renamingSessionId) {
        const input = document.createElement('input');
        input.className = 'session-tab-rename';
        input.type = 'text';
        input.value = session.title;
        input.addEventListener('click', (event) => event.stopPropagation());
        input.addEventListener('keydown', (event) => {
          if (event.key === 'Enter') {
            event.preventDefault();
            commitRename(session, input.value);
          } else if (event.key === 'Escape') {
            event.preventDefault();
            renamingSessionId = null;
            renderTabs();
          }
        });
        input.addEventListener('blur', () => commitRename(session, input.value));
        tab.append(input);
        sessionTabs.append(tab);
        input.focus();
        input.select();
        continue;
      }

      const label = document.createElement('span');
      label.className = 'session-tab-label';
      label.textContent = session.title;
      tab.append(label);

      if (sessions.length > 1) {
        const close = document.createElement('span');
        close.className = 'session-close';
        close.textContent = '×';
        close.setAttribute('aria-label', `${session.title} 닫기`);
        close.addEventListener('click', (event) => {
          event.stopPropagation();
          closeSession(session.id);
        });
        tab.append(close);
      }

      sessionTabs.append(tab);
    }
  }

  function activateSession(id) {
    activeSessionId = id;
    for (const session of sessions) {
      const active = session.id === id;
      session.container.classList.toggle('active', active);
      if (active) {
        resizeSession(session);
        session.term.focus();
      }
    }
    renderTabs();
  }

  function closeSession(id) {
    if (sessions.length <= 1) return;
    const index = sessions.findIndex((session) => session.id === id);
    if (index === -1) return;

    const [session] = sessions.splice(index, 1);
    session.ws.close();
    session.term.dispose();
    session.container.remove();

    const nextActive = sessions[Math.max(0, index - 1)];
    activateSession(activeSessionId === id ? nextActive.id : activeSessionId);
  }

  function createSession() {
    const id = nextSessionId;
    nextSessionId += 1;

    const container = document.createElement('div');
    container.className = 'terminal-session';
    terminalHost.append(container);

    const term = new Terminal(terminalOptions);
    const fitAddon = new FitAddon.FitAddon();
    const ws = new WebSocket(`${proto}://${location.host}`);
    const session = {
      id,
      title: `Session ${id}`,
      container,
      term,
      fitAddon,
      ws,
      pendingMessages: [],
      pointerDownPos: null,
      isDraggingScrollbar: false,
      lastPointerDownAt: 0,
      pointerClickCount: 0,
    };

    term.loadAddon(fitAddon);
    term.open(container);
    attachScrollbarHitArea(session);
    attachTerminalBehavior(session);

    ws.onmessage = (event) => {
      term.write(event.data);
    };

    ws.onopen = () => {
      resizeSession(session);
      flushPendingMessages(session);
    };

    ws.onclose = () => {
      if (!term.element) return;
      term.write('\r\n[session closed]\r\n');
    };

    sessions.push(session);
    activateSession(id);
  }

  addSessionButton.addEventListener('click', createSession);

  document.addEventListener('keydown', (e) => {
    if (!e.metaKey) return;

    if (e.key.toLowerCase() === 't') {
      e.preventDefault();
      createSession();
      return;
    }

    if (e.key.toLowerCase() === 'a') {
      const activeSession = sessions.find((session) => session.id === activeSessionId);
      if (!activeSession) return;
      e.preventDefault();
      activeSession.term.selectAll();
    }
  });

  window.addEventListener('resize', () => {
    const activeSession = sessions.find((session) => session.id === activeSessionId);
    if (activeSession) resizeSession(activeSession);
  });

  createSession();
</script>
</body>
</html>
